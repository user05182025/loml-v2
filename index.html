<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary Lover 💙</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(to bottom,#8fb6d9,#b8d4ec);
display:flex;
justify-content:center;
align-items:center;
}

/* LOGIN PAGE */

.login-page{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(to bottom,#8fb6d9,#b8d4ec);
z-index:10;
}

.login-box{
width:320px;
padding:40px 30px;
border-radius:25px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
animation:fadeIn 1s ease;
}

.login-box h1{
color:white;
font-size:28px;
margin-bottom:12px;
}

.login-box p{
color:white;
font-size:14px;
margin-bottom:20px;
opacity:0.9;
}

input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:15px;
font-size:16px;
text-align:center;
margin-bottom:20px;
}

button{
padding:13px 25px;
border:none;
border-radius:15px;
background:white;
color:#5c89b3;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* LETTER PAGE */

.letter-page{
display:none;
position:absolute;
width:100%;
height:100%;
justify-content:center;
align-items:center;
background:linear-gradient(to bottom,#8fb6d9,#b8d4ec);
overflow:hidden;
}

/* floating hearts */

.hearts span{
position:absolute;
bottom:-50px;
color:white;
font-size:20px;
animation:float 7s linear infinite;
opacity:0.7;
}

.hearts span:nth-child(1){left:10%;animation-delay:0s;}
.hearts span:nth-child(2){left:30%;animation-delay:2s;}
.hearts span:nth-child(3){left:50%;animation-delay:4s;}
.hearts span:nth-child(4){left:70%;animation-delay:1s;}
.hearts span:nth-child(5){left:90%;animation-delay:3s;}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}
30%{
opacity:1;
}
100%{
transform:translateY(-1000px) rotate(360deg);
opacity:0;
}
}

/* ENVELOPE */

.envelope{
position:relative;
width:330px;
height:220px;
background:white;
border-radius:10px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
overflow:hidden;
}

/* envelope top flap */

.envelope::before{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#dcecff;
clip-path:polygon(0 0,50% 50%,100% 0);
z-index:3;
}

/* LETTER */

.letter{
position:absolute;
width:90%;
height:290px;
background:white;
left:5%;
top:25px;
border-radius:12px;
padding:25px;
z-index:2;
animation:slideUp 2s ease forwards;
overflow:auto;
}

.letter h2{
text-align:center;
color:#5c89b3;
margin-bottom:20px;
}

.letter p{
font-size:15px;
line-height:1.8;
color:#444;
white-space:pre-line;
}

@keyframes slideUp{
0%{
transform:translateY(180px);
}
100%{
transform:translateY(-75px);
}
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:480px){

.envelope{
width:290px;
height:200px;
}

.letter{
height:260px;
}

}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div class="login-page" id="loginPage">

<div class="login-box">

<h1>Happy Anniversary Lover 💙</h1>

<p>clue : anniversary date</p>

<input
type="text"
id="password"
placeholder="MM/DD/YYYY"
maxlength="10"
>

<button onclick="checkPassword()">
Open Letter
</button>

</div>

</div>

<!-- LETTER PAGE -->

<div class="letter-page" id="letterPage">

<div class="hearts">
<span>♡</span>
<span>♡</span>
<span>♡</span>
<span>♡</span>
<span>♡</span>
</div>

<div class="envelope">

<div class="letter">

<h2>My Love 💙</h2>

<p>

WRITE YOUR MESSAGE HERE

</p>

</div>

</div>

</div>

<script>

function checkPassword(){

let password =
document.getElementById("password").value;

// remove slashes automatically
password = password.replaceAll("/", "");

if(password === "05182025"){

document.getElementById("loginPage").style.display = "none";

document.getElementById("letterPage").style.display = "flex";

}

else{

alert("Wrong anniversary date 💔");

}

}

</script>

</body>
</html>
